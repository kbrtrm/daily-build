<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>daily build</title>
<style>
  html,body{margin:0;height:100%;background:#0e0e12;overflow:hidden}
  body{display:flex;align-items:center;justify-content:center}
  canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block}
  #back{position:fixed;top:8px;left:10px;z-index:10;text-decoration:none;color:#8a8a98;
    font:600 13px/1 -apple-system,system-ui,sans-serif;opacity:.5;
    transition:opacity .15s,color .15s;-webkit-user-select:none;user-select:none}
  #back:hover{opacity:1;color:#fff}
</style>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>

<body>
<a id="back" href="../" title="back to the shelf">‹ shelf</a>
<script>
/* ══════════════════════════════════════════════════════
   DAILY BUILD · p5.js template
   ── Seed ──────────────────────────────────────────────
   Prompt:   the rope remembers where you were going
   Riff on:  Bionic Commando / Spider-Man swinging
   ══════════════════════════════════════════════════════ */

/* ---------- CONFIG ---------- */
const GAME_W = 320;      // logical pixels wide
const GAME_H = 180;      // logical pixels tall
const BG     = '#0e0e12';

/* g = your pixel canvas. Draw EVERYTHING to it: g.rect(), g.fill(), g.text()… */
let g, S = 1, OX = 0, OY = 0;   // scale + offsets, managed for you


/* ══════════════════════════════════════════════════════
   YOUR GAME   ── the only section you edit ──
   Delete the demo, keep reset() / update(dt) / render().
   ══════════════════════════════════════════════════════ */

/* ---------- grapple swing ----------
   Hold the mouse to fire a hook at the nearest anchor above you.
   The rope goes taut and you swing on it, pendulum-style.
   Let go to fling — the rope remembers where you were going.
   Collect orbs, don't touch the ground. Distance is score.        */

const GROUND = GAME_H - 8;        // floor y
const GRAV   = 340;               // gravity px/s²
const CAM_X  = GAME_W * 0.32;     // where the player sits on screen
const GRAB_R = 90;                // max reach to an anchor
const AIR_ACC = 120;              // air steering
const PUMP     = 150;             // auto-pump thrust along the swing (px/s²)
const PUMP_MAX = 205;             // target tangential speed — swing self-limits here

/* A level IS a song. Each measure = one hook (a BASS note played on the grab)
   whose swing-arc carries that bar's MELODY notes as orbs. Play it clean —
   grab every hook, sweep every orb — and you hear the whole arrangement. */
const C3=130.81, G3=196.00, F3=174.61;                          // bass roots
const C5=523.25, D5=587.33, E5=659.25, F5=698.46, G5=783.99;    // melody
// Canon's ground bass runs lower; its melody lives in D major
const D3=146.83, B2=123.47, A2=110.00, G2=98.00, Fs2=92.50, D2=73.42;
const E4=329.63, Fs4=369.99, G4=392.00, A4=440.00, B4=493.88,
      Cs5=554.37, Fs5=739.99, A5=880.00;
// Für Elise lives in A minor
const E2=82.41, Gs4=415.30, Ds5=622.25;
const LEVELS = [
  /* One entry = one hook = one swing. `mel` can hold ANY number of notes —
     the arc sweep widens to fit them. `beats` is how long the swing lasts in
     song time (defaults to the note count), so hooks stay evenly timed even
     when a swing carries fewer notes than beats (i.e. a held note). */
  { name:'Ode to Joy', by:'Beethoven', measures:[
    { bass:C3, mel:[E5,E5,F5,G5]      },   // C : E E F G
    { bass:G3, mel:[G5,F5,E5,D5]      },   // G : G F E D
    { bass:C3, mel:[C5,C5]            },   // C : C C
    { bass:C3, mel:[D5,E5]            },   // C : D E
    { bass:G3, mel:[E5,D5,D5], beats:4 },  // G : E D D–  (half cadence, held)
    { bass:C3, mel:[E5,E5,F5,G5]      },   // C : E E F G
    { bass:G3, mel:[G5,F5,E5,D5]      },   // G : G F E D
    { bass:G3, mel:[C5,C5,D5,E5]      },   // G : C C D E
    { bass:C3, mel:[D5,C5,C5], beats:4 },  // C : D C C–  (resolve, held)
  ] },

  /* The Canon is built ON its bass — that 8-note ground (D A B F# G D G A) is
     the famous part, so here the HOOKS carry the tune. It repeats the ground
     twice: first under the quarter-note melody, then under running eighths,
     which is exactly how the piece builds. Two notes per swing, then four. */
  { name:'Canon in D', by:'Pachelbel', beatDx:48, measures:[
    // ── cycle 1: the ground bass under the classic melody (2 notes/swing)
    { bass:D3,  mel:[Fs5,E5]  },   // D  : F# E
    { bass:A2,  mel:[D5,Cs5]  },   // A  : D  C#
    { bass:B2,  mel:[B4,A4]   },   // Bm : B  A
    { bass:Fs2, mel:[B4,Cs5]  },   // F#m: B  C#
    { bass:G2,  mel:[D5,Cs5]  },   // G  : D  C#
    { bass:D2,  mel:[B4,A4]   },   // D  : B  A
    { bass:G2,  mel:[G4,Fs4]  },   // G  : G  F#
    { bass:A2,  mel:[G4,E4]   },   // A7 : G  E   → pulls back to D
    // ── cycle 2: same ground, melody breaks into eighths (4 notes/swing)
    { bass:D3,  mel:[Fs5,A5,Fs5,D5],  beats:2 },   // D
    { bass:A2,  mel:[E5,Cs5,E5,A4],   beats:2 },   // A
    { bass:B2,  mel:[D5,B4,D5,Fs5],   beats:2 },   // Bm
    { bass:Fs2, mel:[Cs5,A4,Cs5,Fs4], beats:2 },   // F#m
    { bass:G2,  mel:[B4,D5,B4,G4],    beats:2 },   // G
    { bass:D2,  mel:[A4,Fs5,A4,D5],   beats:2 },   // D
    { bass:G2,  mel:[B4,G4,B4,D5],    beats:2 },   // G
    { bass:A2,  mel:[Cs5,E5,Cs5,A4],  beats:2 },   // A7 → resolve
  ] },

  /* Für Elise: the bass is a plain Am/E alternation — here the MELODY is the
     antagonist. That chromatic E–D#–E–D# trill is four tight notes on one
     swing, and the tempo is quicker (beatDx 28) so the hooks come at you
     faster than either earlier level. */
  { name:'Für Elise', by:'Beethoven', beatDx:28, measures:[
    { bass:A2, mel:[E5,Ds5,E5,Ds5]  },   // Am : the trill
    { bass:A2, mel:[E5,B4,D5,C5]    },   // Am : E B D C
    { bass:A2, mel:[A4,E4,A4,B4]    },   // Am : land on A, arpeggio up, B
    { bass:E2, mel:[E4,Gs4,B4,C5]   },   // E  : E G# B → C
    { bass:A2, mel:[E4,E5,Ds5,E5]   },   // Am : back into the trill
    { bass:A2, mel:[Ds5,E5,B4,D5]   },   // Am
    { bass:A2, mel:[C5,A4,E4,A4]    },   // Am : resolve, arpeggio
    { bass:E2, mel:[B4,E4,Gs4,B4]   },   // E
    { bass:A2, mel:[C5,E4,E5,Ds5]   },   // Am : and again
    { bass:A2, mel:[E5,Ds5,E5,B4]   },   // Am
    { bass:A2, mel:[D5,C5,A4], beats:4 },// Am : final resolve, held
  ] },
];

let phase;        // 'title' | 'play'
let p;            // player
let cam;          // camera x (world scroll)
let anchors;      // [{x,y}] generated ahead
let orbs;         // [{x,y,got}]
let parts;        // particles
let hook;         // {anchor, len, taut} or null
let dead, deadT;  // crash state
let best, run;    // best distance, current run distance
let combo;        // orbs grabbed without crashing
let camY;         // vertical camera offset — follows you when you fly high
let skipStreak;   // hooks flown past without grabbing
let pop;          // transient popup {t, msg}
let hazards;      // floating spike mines
let chaser;       // { x, on } — the dark that hunts you
let deathMsg;     // label shown on the death screen
let grabbed;      // caught & aiming a spit-out escape
let spitUsed;     // the one free escape, spent per run
let aim, aimDir;  // spit aim angle + sweep direction
let milestone;    // highest 100m marker passed
let mileT, mileMsg;       // milestone celebration timer + label
let levelEndX;    // x of the finish gate
let won;          // level cleared
let level;        // current level index
let prevWant;     // was the grapple held last frame? (release on the edge)
let trail;        // recent positions, for the scarf
let scarfOn;      // scarf cosmetic unlocked?
let scarfNew;     // just unlocked it this run
let gameDone;     // cleared the last level
let notesHit;     // melody notes actually played — drives the level score
let entering;     // typing initials for a new high score
let initials;     // what they've typed so far
let lastScore, lastPct;   // this run's result
let stars;        // parallax dots

/* deterministic-ish generator so the course is varied but not jittery */
let _seed = 1337;
function rnd(){ _seed = (_seed*1103515245 + 12345) & 0x7fffffff; return _seed / 0x7fffffff; }

/* Each bar = one hook (bass on the grab) whose swing arc carries that bar's
   melody orbs, strung along the pendulum sweep BELOW the hook. Hooks are
   evenly spaced so the bass pulse is steady. */
const BEAT_DX = 32;             // horizontal distance per beat → even timing
const M_X0    = 64;             // x of the first hook
const ARC_R   = 50;             // swing radius the orbs sit on (= opening rope)

/* Hooks hang at their PITCH's height — the bass line reads like a staff.
   x is time, y is pitch, so the level is the score. The map is absolute (a
   given note is always at the same height) rather than normalised per level,
   so Canon's low ground really does sit lower than Ode's. Low note = low hook
   = a deep swing near the floor: the music writes the difficulty. */
const STAFF_REF_HZ = 146.83;    // D3 …
const STAFF_REF_Y  = 30;        // … sits here
const STAFF_OCT_PX = 44;        // pixels per octave
function hookY(freq){
  const y = STAFF_REF_Y + Math.log2(STAFF_REF_HZ/freq)*STAFF_OCT_PX;
  return Math.max(12, Math.min(84, y));      // keep it on screen & off the floor
}
function buildLevel(idx){
  const lv = LEVELS[idx];
  const dx = lv.beatDx || BEAT_DX;               // per-level tempo
  anchors = []; orbs = []; hazards = [];
  let beat = 0;
  for (const m of lv.measures){
    const notes = m.mel.filter(n => n != null);
    const beats = m.beats || notes.length;       // swing length in song time
    const x = M_X0 + beat*dx;
    const ay = hookY(m.bass);                    // height = this note's pitch
    anchors.push({ x, y: ay, bass: m.bass, used:false });
    // orbs ride this hook's arc; the sweep widens to fit however many notes
    const n = notes.length;
    const thA = -0.35, thB = thA + Math.min(1.45, 0.40*n);
    for (let k=0; k<n; k++){
      const th = n>1 ? thA + (thB - thA)*(k/(n-1)) : (thA+thB)/2;
      orbs.push({ x: x + Math.sin(th)*ARC_R, y: ay + Math.cos(th)*ARC_R,
                  got:false, t:0, note:notes[k] });
    }
    beat += beats;
  }
  levelEndX = M_X0 + beat*dx + 24;               // finish gate past the last beat
}

function reset(){
  p = { x: 20, y: 32, vx: 26, vy: 0, sz: 9, squash: 1, tx: 0, ty: 0, ang: 0 };
  cam = 0; camY = 0;
  anchors = []; orbs = []; parts = []; hazards = [];
  hook = null; dead = false; deadT = 0; run = 0; combo = 0;
  skipStreak = 0; pop = { t:0, msg:'' };
  chaser = { x: -300, on:false }; deathMsg = 'splat!';
  grabbed = false; spitUsed = false; aim = -0.9; aimDir = 1;
  milestone = 0; mileT = 0; mileMsg = ''; won = false; prevWant = false; notesHit = 0;
  entering = false; initials = ''; lastScore = 0; lastPct = 0;
  trail = []; scarfOn = hasScarf(); scarfNew = false; gameDone = false;
  level = level || 0;
  phase = 'title';
  best = best || 0;
  stars = [];
  for (let i=0;i<40;i++) stars.push({ x: rnd()*GAME_W*4, y: rnd()*GROUND, z: 0.2+rnd()*0.5 });
  _seed = 1337;
  buildLevel(level);
  hangAtStart(false);            // pose at the first hook for the title screen
}

/* ---- high scores ----
   Per-device via localStorage: your board survives reloads, but it is NOT
   shared between players — that would need a backend this static page
   doesn't have. Storage is isolated here so a remote store can drop in.
   Wrapped in try/catch: localStorage throws on file:// and in private mode. */
const HS_KEY = 'grapple.hiscores.v1';
const HS_MAX = 5;
function loadBoard(){
  try { return JSON.parse(localStorage.getItem(HS_KEY)) || {}; }
  catch(e){ return {}; }
}
function boardFor(lv){
  const list = loadBoard()[lv] || [];
  return list.slice().sort((a,b) => b.score - a.score).slice(0, HS_MAX);
}
function qualifies(lv, score){
  const b = boardFor(lv);
  return b.length < HS_MAX || score > b[b.length-1].score;
}
/* the scarf: earned once, worn forever after */
const SCARF_KEY = 'grapple.scarf.v1';
function hasScarf(){ try { return localStorage.getItem(SCARF_KEY) === '1'; } catch(e){ return false; } }
function unlockScarf(){ try { localStorage.setItem(SCARF_KEY, '1'); } catch(e){} }

function addScore(lv, ini, score, pct){
  const all = loadBoard();
  const list = all[lv] || [];
  list.push({ ini, score, pct });
  list.sort((a,b) => b.score - a.score);
  all[lv] = list.slice(0, HS_MAX);
  try { localStorage.setItem(HS_KEY, JSON.stringify(all)); } catch(e){}
}

/* ---- little synth ----
   The engine's beep() is a 5ms-attack pluck that dies on an exponential —
   fine for blips, but notes need to actually sustain. These two voices share
   a real ADSR and shape their tone through a low-pass. */
function adsr(ac, t, dur, peak, A, D, S, R){
  const g = ac.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(peak,   t + A);            // attack
  g.gain.linearRampToValueAtTime(peak*S, t + A + D);        // decay → sustain
  g.gain.setValueAtTime(peak*S,          t + dur);          // hold
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur + R); // release
  return g;
}
function tone(ac, dest, type, freq, detune, gain, t, stopAt){
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.value = freq; o.detune.value = detune;
  g.gain.value = gain; o.connect(g); g.connect(dest);
  o.start(t); o.stop(stopAt);
}

/* bass: detuned squares rounded off by a low-pass, sine sub under for weight */
function bassNote(freq, dur){
  dur = dur || 0.75;
  const ac = _audio(), t = ac.currentTime, R = 0.30, end = t + dur + R + 0.05;
  const out = adsr(ac, t, dur, 0.19, 0.012, 0.13, 0.62, R);
  out.connect(ac.destination);
  const lp = ac.createBiquadFilter();
  lp.type = 'lowpass'; lp.Q.value = 4;
  lp.frequency.setValueAtTime(freq*10, t);                    // bright on the pluck
  lp.frequency.exponentialRampToValueAtTime(Math.max(freq*2.4, 110), t + dur*0.6);
  lp.connect(out);
  tone(ac, lp,  'square', freq, -8, 0.34, t, end);
  tone(ac, lp,  'square', freq,  8, 0.34, t, end);
  tone(ac, out, 'sine',   freq,  0, 0.45, t, end);   // sub bypasses the filter
}

/* melody: soft triangle bell that rings on a little after the pluck */
function melodyNote(freq, dur){
  dur = dur || 0.34;
  const ac = _audio(), t = ac.currentTime, R = 0.28, end = t + dur + R + 0.05;
  const out = adsr(ac, t, dur, 0.13, 0.006, 0.09, 0.50, R);
  out.connect(ac.destination);
  const lp = ac.createBiquadFilter();
  lp.type = 'lowpass'; lp.Q.value = 1;
  lp.frequency.setValueAtTime(freq*8, t);
  lp.frequency.exponentialRampToValueAtTime(Math.max(freq*3, 500), t + dur);
  lp.connect(out);
  tone(ac, lp,  'triangle', freq,   0, 0.70, t, end);
  tone(ac, lp,  'triangle', freq,   7, 0.22, t, end);   // shimmer
  tone(ac, lp,  'sine',     freq,   0, 0.30, t, end);
  tone(ac, out, 'sine',     freq*2, 0, 0.05, t, t + 0.12);  // brief sparkle
}

/* You begin the level already hanging from hook 1, just behind the first note
   and swinging into it — the song opens on its downbeat, no scramble to grab. */
function hangAtStart(withHook){
  const a = anchors[0];
  const th = -0.55;                        // just behind the bar's first orb
  p.x = a.x + Math.sin(th)*ARC_R;
  p.y = a.y + Math.cos(th)*ARC_R;
  p.vx = 40; p.vy = 0;
  if (!withHook) return;
  a.used = true;
  hook = { anchor:a, len:ARC_R, taut:1 };  // rope = the orb arc radius
  prevWant = false;      // the title press is not a hold you established
  trail = [];
  a.flash = 1; tween(a, { flash:0 }, 0.3, ease.outQuad);
  bassNote(a.bass, 0.8);                   // the opening downbeat
}

/* nearest anchor within reach & above-ish the player */
function pickAnchor(){
  let best=null, bd=GRAB_R;
  for (const a of anchors){
    const dx=a.x-p.x, dy=a.y-p.y, d=Math.hypot(dx,dy);
    if (d < bd && a.y < p.y + 30){ bd=d; best=a; }
  }
  return best;
}

function fire(){
  const a = pickAnchor();
  if (!a){ beep(140, 0.05, 'sawtooth', 0.08); return; }   // whiff
  a.used = true; skipStreak = 0;
  hook = { anchor:a, len: Math.hypot(a.x-p.x, a.y-p.y), taut:0 };
  tween(hook, { taut:1 }, 0.12, ease.outCubic);
  a.flash = 1; tween(a, { flash:0 }, 0.3, ease.outQuad);
  // the grab IS the bass note for this measure — sustains under the bar
  bassNote(a.bass, 0.8);
}

function release(){
  if (!hook) return;
  hook = null;
  p.squash = 0.6; tween(p, { squash:1 }, 0.3, ease.outBack);
  sweep(680, 240, 0.14, 'sine', 0.1);
}

function update(dt){
  if (phase === 'title'){
    if (pressed('space') || clicked()){ phase = 'play'; hangAtStart(true); }
    return;
  }
  if (won){
    // keep the confetti alive
    for (const s of parts){ s.x+=s.vx*dt; s.y+=s.vy*dt; s.vy+=200*dt; s.life-=dt; }
    parts = parts.filter(s => s.life > 0);
    if (mileT > 0) mileT = Math.max(0, mileT - dt);

    if (entering){
      // arcade initials: type up to 3 letters, backspace to fix, enter to sign
      for (const k of _pressed){
        if (/^[a-z]$/.test(k) && initials.length < 3) initials += k.toUpperCase();
        else if (k === 'backspace') initials = initials.slice(0, -1);
        else if (k === 'enter' && initials.length){
          addScore(level, initials, lastScore, lastPct);
          entering = false;
          beep(880, 0.08, 'triangle', 0.10); beep(1318.5, 0.14, 'sine', 0.06);
        }
      }
      return;                                    // space must not skip the entry
    }
    if (pressed('space') || clicked()){
      level = gameDone ? 0 : level + 1;          // last song → back to the top
      reset();
    }
    return;
  }
  if (dead){
    deadT -= dt;
    if (deadT <= 0){ reset(); phase = 'play'; hangAtStart(true); }   // fast retry, skip the title
    return;
  }
  if (grabbed){
    // held in the dark's grip — sweep an aim arrow, press to launch out
    aim += aimDir * 1.6 * dt;
    if (aim >  0.15){ aim =  0.15; aimDir = -1; }
    if (aim < -1.55){ aim = -1.55; aimDir =  1; }
    p.x = chaser.x + p.sz; p.vx = 0; p.vy = 0;     // pinned at the mouth
    if (pressed('space') || clicked()){
      grabbed = false;
      p.vx = Math.cos(aim)*260;
      p.vy = Math.sin(aim)*260;                     // aim<0 launches upward
      chaser.x = p.x - 460;                         // shove the dark back
      shake(5, 0.3); beep(620, 0.08); sweep(200, 820, 0.22, 'square', 0.12);
      for (let i=0;i<16;i++) parts.push(spark(p.x, p.y, '#c86bff'));
      pop = { t:1.0, msg:'spat out!' };
    }
    return;
  }
  if (pressed('esc')){ reset(); return; }          // bail back to the title
  const wantHook = mouseIsPressed || down('space');
  // You open the level already hooked. Release only on an actual LET-GO (a
  // true→false edge), never on merely "not holding" — otherwise the press
  // that started the level flings you off a dead hang the instant you lift
  // it. So: hold from the title and let go → you fling, one press. Tap to
  // start and sit there → you just keep swinging until you take hold.
  if (wantHook && !hook) fire();
  if (prevWant && !wantHook && hook) release();
  prevWant = wantHook;

  // integrate
  p.vy += GRAV * dt;
  // slight air steering for control
  if (down('left'))  p.vx -= AIR_ACC*dt;
  if (down('right')) p.vx += AIR_ACC*dt;
  p.x += p.vx * dt;
  p.y += p.vy * dt;

  // rope constraint + auto-pump → pendulum
  if (hook){
    const a = hook.anchor;
    let dx = p.x - a.x, dy = p.y - a.y, d = Math.hypot(dx,dy) || 0.0001;
    const nx = dx/d, ny = dy/d;            // radial, out from anchor
    const tx = -ny, ty = nx;              // tangent
    // auto-pump: nudge along the swing, but cap by total swing ENERGY so the
    // arc settles at a set amplitude instead of winding up over the top.
    const tang   = p.vx*tx + p.vy*ty;
    const height = (a.y + hook.len) - p.y;                 // rise above bottom
    const energy = 0.5*(p.vx*p.vx + p.vy*p.vy) + GRAV*height;
    if (energy < 0.5*PUMP_MAX*PUMP_MAX){
      const dir = tang >= 0 ? 1 : -1;
      p.vx += tx*dir*PUMP*dt;
      p.vy += ty*dir*PUMP*dt;
    }
    // keep on the circle, kill outward velocity
    if (d > hook.len){
      p.x = a.x + nx*hook.len;
      p.y = a.y + ny*hook.len;
      const radial = p.vx*nx + p.vy*ny;
      if (radial > 0){ p.vx -= radial*nx; p.vy -= radial*ny; }
    }
  }

  // very light drag so momentum carries across gaps
  p.vx *= (1 - 0.06*dt);

  // soft speed ceiling, just a safety net
  const sp = Math.hypot(p.vx, p.vy);
  if (sp > 260){ const k = 260/sp; p.vx *= k; p.vy *= k; }

  // camera + distance
  cam = p.x - CAM_X;
  if (cam < 0) cam = 0;
  // vertical camera: 0 when low (ground in view), pans up as you fly high
  const camYT = Math.min(0, p.y - GAME_H*0.55);
  camY += (camYT - camY) * Math.min(1, 6*dt);
  run = Math.max(run, Math.floor(p.x/10));
  if (run > best) best = run;
  // crossed a 100m marker? celebrate
  const hund = Math.floor(p.x / 1000);
  if (hund > milestone){ milestone = hund; celebrate(hund * 100); }
  if (mileT > 0) mileT = Math.max(0, mileT - dt);

  // reached the finish gate → level cleared. Return immediately: the rest of
  // this frame (skip bonuses, chaser) would otherwise fire popups over the
  // results screen — crossing the line does sail you past un-grabbed hooks.
  if (!won && p.x > levelEndX){ winLevel(); return; }

  // bonus for daring: fly past a hook without grabbing it
  for (const a of anchors){
    if (!a.used && !a.skipped && a.x < p.x - 6){
      a.skipped = true;
      skipStreak++;
      const bonus = 4 + skipStreak*3;
      run += bonus; if (run > best) best = run;
      pop = { t:0.85, msg: 'skip +' + bonus + (skipStreak > 1 ? '  ×'+skipStreak : '') };
      for (let i=0;i<8;i++) parts.push(spark(a.x, a.y, '#7fd4ff'));
      sweep(320 + skipStreak*55, 760 + skipStreak*70, 0.12, 'sine', 0.09);
    }
  }
  if (pop.t > 0) pop.t = Math.max(0, pop.t - dt);

  // the dark wakes once you're rolling, then hunts — faster the further you go
  if (!chaser.on && run >= 35){
    chaser.on = true; chaser.x = cam - 40;
    beep(64, 0.55, 'sawtooth', 0.16); sweep(190, 66, 0.7, 'triangle', 0.11);   // the dark wakes
  }
  if (chaser.on){
    chaser.x += (44 + Math.min(run, 450)*0.12) * dt;
    if (chaser.x < p.x - 460) chaser.x = p.x - 460;     // give room to recover from a fumble
    if (chaser.x > p.x - p.sz*0.5){
      if (spitUsed){ die('caught!', false); }           // no mercy the second time
      else {                                            // first catch: grab & spit
        grabbed = true; spitUsed = true; aim = -0.9; aimDir = 1;
        hook = null; p.vx = 0; p.vy = 0;
        shake(4, 0.3); sweep(520, 130, 0.3, 'sawtooth', 0.12);
        pop = { t:1.6, msg:'grabbed! aim & press to launch' };
      }
    }
  }

  // orbs
  for (const o of orbs){
    if (o.got){ o.t += dt; continue; }
    o.t += dt;
    if (Math.hypot(o.x-p.x, o.y-p.y) < 11){
      o.got = true; o.t = 0;
      combo++; notesHit++;
      run += 3 + combo; if (run>best) best=run;
      for (let i=0;i<10;i++) parts.push(spark(o.x, o.y, '#ffd76a'));
      // each orb sings its own melody note, ringing on a little
      melodyNote(o.note, 0.34);
      p.squash = 0.8; tween(p, {squash:1}, 0.2, ease.outBack);
    }
  }

  // hazards: spin, and bite if you clip one
  for (const hz of hazards){
    hz.spin += dt*3;
    if (Math.abs(hz.x - p.x) > GAME_W) continue;
    if (Math.hypot(hz.x-p.x, hz.y-p.y) < p.sz*0.5 + hz.r - 2){ die('spiked!', false); break; }
  }
  if (hazards.length > 45) hazards.splice(0, hazards.length-45);

  // point the sprite along travel + facing
  p.ang = Math.atan2(p.vy, p.vx);

  // particles
  for (const s of parts){ s.x += s.vx*dt; s.y += s.vy*dt; s.vy += 200*dt; s.life -= dt; }
  parts = parts.filter(s => s.life > 0);

  // trail
  p.tx = p.tx*0.6 + p.x*0.4; p.ty = p.ty*0.6 + p.y*0.4;
  trail.push({ x:p.x, y:p.y });                  // scarf history
  if (trail.length > 18) trail.shift();

  // crash on ground
  if (p.y > GROUND - p.sz/2){ die('splat!', true); }
  // no ceiling — fly as high as your momentum takes you
}

function die(msg, atGround){
  if (dead) return;
  dead = true; deadT = 0.9; combo = 0; skipStreak = 0;
  hook = null; deathMsg = msg;
  if (atGround) p.y = GROUND - p.sz/2;
  const yy = atGround ? GROUND-2 : p.y;
  shake(6, 0.4);
  beep(90, 0.3, 'sawtooth', 0.16);
  sweep(220, 60, 0.35, 'square', 0.12);
  for (let i=0;i<18;i++) parts.push(spark(p.x, yy, '#ff5b5b'));
}

function winLevel(){
  won = true; hook = null; chaser.on = false;
  mileT = 0; pop.t = 0;          // clear any in-flight popups so they don't
                                 // collide with the results screen
  lastScore = run + notesHit*10;
  lastPct   = Math.round(notesHit / Math.max(1, orbs.length) * 100);
  entering  = qualifies(level, lastScore);   // made the board? sign it
  initials  = '';
  gameDone  = (level === LEVELS.length - 1); // that was the last song
  if (gameDone && !hasScarf()){              // first clear ever → the scarf
    unlockScarf(); scarfOn = true; scarfNew = true;
  }
  const cols = ['#ffd76a','#7fd4ff','#ff8ad0','#ffffff'];
  for (let i=0;i<40;i++) parts.push(spark(p.x, p.y, cols[i%4]));
  // a little rising fanfare
  beep(523.25, 0.14, 'triangle', 0.12);
  beep(659.25, 0.16, 'triangle', 0.11);
  beep(783.99, 0.20, 'triangle', 0.11);
  beep(1046.5, 0.28, 'sine', 0.08);
  shake(3, 0.3);
}

function celebrate(m){
  mileT = 1.5; mileMsg = m + 'm';
  const cols = ['#ffd76a','#7fd4ff','#ff8ad0','#ffffff'];
  for (let i=0;i<26;i++) parts.push(spark(p.x, p.y, cols[i%4]));
  sweep(520, 1050, 0.28, 'triangle', 0.12);
  beep(784, 0.22, 'triangle', 0.10);
  beep(1046.5, 0.20, 'sine', 0.06);
  shake(2, 0.2);
}

function spark(x,y,c){
  const a = Math.random()*Math.PI*2, s = 30+Math.random()*90;
  return { x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 40, life: 0.4+Math.random()*0.4, c };
}

/* world → screen x */
function sx(x){ return x - cam; }

function render(){
  g.background(BG);
  g.noStroke();

  // parallax stars
  for (const st of stars){
    const px = st.x - cam*st.z;
    let wx = ((px % GAME_W) + GAME_W) % GAME_W;
    g.fill(40 + st.z*40); g.rect(wx, st.y, 1, 1);
  }

  // world layer — shifted by the vertical camera
  g.push();
  g.translate(0, -Math.round(camY));

  // ground
  g.fill('#181820'); g.rect(0, GROUND, GAME_W, GAME_H-GROUND);
  g.fill('#22222c'); g.rect(0, GROUND, GAME_W, 1);

  // major distance markers every 100m
  const M = 1000;
  for (let wx = Math.max(M, Math.floor(cam/M)*M); wx < cam + GAME_W + M; wx += M){
    const X = sx(wx);
    g.stroke(70, 70, 92, 70); g.strokeWeight(1);
    for (let yy = -160; yy < GROUND; yy += 8) g.line(X, yy, X, yy+3);
    g.noStroke();
    g.fill('#44445a'); g.textAlign(CENTER, BOTTOM); g.textSize(8);
    g.text((wx/10) + 'm', X, GROUND - 3);
  }

  // finish gate — checkered flag line
  {
    const X = sx(levelEndX);
    if (X > -8 && X < GAME_W + 8){
      for (let yy=0, row=0; yy<GROUND; yy+=6, row++)
        { g.fill(row%2 ? '#e8e8f0' : '#20202a'); g.rect(X-2, yy, 4, 6); }
      g.fill('#7fd4ff'); g.textAlign(CENTER, BOTTOM); g.textSize(8);
      g.text('END', X, -4);
    }
  }

  // orbs
  for (const o of orbs){
    if (o.got) continue;
    const X = sx(o.x); if (X < -12 || X > GAME_W+12) continue;
    const bob = Math.sin(o.t*3)*2;
    g.fill('#3a2f14'); g.ellipse(X, o.y+bob, 9, 9);
    g.fill('#ffd76a'); g.ellipse(X, o.y+bob, 6, 6);
    g.fill('#fff2c4'); g.ellipse(X-1, o.y+bob-1, 2, 2);
  }

  // anchors
  for (const a of anchors){
    const X = sx(a.x); if (X < -8 || X > GAME_W+8) continue;
    const grabbed = hook && hook.anchor === a;
    if (a.flash){ g.fill(255, a.flash*180); g.ellipse(X, a.y, 12, 12); }
    g.fill(grabbed ? '#7fd4ff' : '#4b4b58');
    g.ellipse(X, a.y, 5, 5);
    g.fill('#0e0e12'); g.ellipse(X, a.y, 2, 2);
  }

  // hazards — spinning spike mines
  for (const hz of hazards){
    const X = sx(hz.x); if (X < -12 || X > GAME_W+12) continue;
    g.fill('#c8433a');
    for (let i=0; i<8; i++){
      const a = hz.spin + i*Math.PI/4;
      g.push(); g.translate(X + Math.cos(a)*hz.r, hz.y + Math.sin(a)*hz.r);
      g.rotate(a); g.rect(-1.4, -1.4, 2.8, 2.8); g.pop();
    }
    g.fill('#7a1f1a'); g.ellipse(X, hz.y, hz.r*1.5, hz.r*1.5);
    g.fill('#e06b60'); g.ellipse(X, hz.y, hz.r*0.7, hz.r*0.7);
  }

  // rope
  if (hook){
    const a = hook.anchor;
    g.stroke('#cfd6e6'); g.strokeWeight(1);
    g.line(sx(a.x), a.y, sx(p.x), p.y);
    g.noStroke();
  }

  // the scarf — earned by clearing every song, worn ever after.
  // trail[] runs oldest→newest, so i = last is AT the player: thick and solid
  // there, tapering thin and faint out to the tail.
  if (scarfOn && trail.length > 1 && !dead){
    for (let i = trail.length-1; i > 0; i--){
      const t = i/(trail.length-1);              // 1 at the player, 0 at the tail
      const a = trail[i], b = trail[i-1];
      g.strokeWeight(Math.max(1, Math.round(1 + t*3)));
      g.stroke(214 - (1-t)*70, 44 + (1-t)*30, 74 + (1-t)*40, 60 + t*195);
      g.line(sx(a.x), a.y, sx(b.x), b.y);
    }
    g.noStroke(); g.strokeWeight(1);
  }

  // player
  const px = sx(p.x), py = p.y;
  // trail dot
  g.fill(255, 40); g.ellipse(sx(p.tx), p.ty, 6, 6);
  g.fill(dead ? '#ff5b5b' : '#ffffff');
  const w = p.sz*(2-p.squash), h = p.sz*p.squash;
  g.rect(px - w/2, py - h/2, w, h, 3);
  // eye toward travel
  g.fill('#0e0e12');
  g.ellipse(px + Math.cos(p.ang)*2, py + Math.sin(p.ang)*2 - 1, 2, 2);

  // particles
  for (const s of parts){ g.fill(s.c); const r = Math.max(1, s.life*4); g.rect(sx(s.x)-r/2, s.y-r/2, r, r); }

  // reach hint: faint ring on the anchor we'd grab
  if (!hook && !dead && !grabbed){
    const a = pickAnchor();
    if (a){ g.noFill(); g.stroke(127,212,255,120); g.strokeWeight(1);
      g.ellipse(sx(a.x), a.y, 10, 10); g.noStroke(); g.fill('#fff'); }
  }

  // spit-out aim arrow while held by the dark
  if (grabbed){
    const ax = sx(p.x), ay = p.y;
    const L = 26 + Math.sin(frameCount*0.2)*3;
    const ex = ax + Math.cos(aim)*L, ey = ay + Math.sin(aim)*L;
    g.stroke('#c86bff'); g.strokeWeight(1);
    g.line(ax, ay, ex, ey);
    g.line(ex, ey, ex - Math.cos(aim-0.5)*6, ey - Math.sin(aim-0.5)*6);
    g.line(ex, ey, ex - Math.cos(aim+0.5)*6, ey - Math.sin(aim+0.5)*6);
    g.noStroke();
  }

  g.pop();   // end world layer

  // the dark — a clawing wall creeping in from the left (screen space)
  if (chaser.on){
    const edge = sx(chaser.x);
    if (edge > -16){
      g.noStroke();
      g.fill(16, 3, 24, 236); g.rect(0, 0, Math.max(0, edge), GAME_H);
      g.fill(30, 8, 42, 236);
      for (let yy=0; yy<GAME_H; yy+=10){
        const j = 5 + (Math.sin((yy + frameCount)*0.35) + 1)*4;
        g.triangle(edge, yy, edge, yy+10, edge+j, yy+5);
      }
      g.stroke(196, 60, 120, 200); g.strokeWeight(1);
      g.line(edge, 0, edge, GAME_H); g.noStroke();
    }
  }

  // skip popup (screen space)
  if (pop.t > 0){
    g.textAlign(CENTER, TOP); g.textSize(9);
    g.fill(127, 212, 255, 255*Math.min(1, pop.t/0.4));
    g.text(pop.msg, GAME_W/2, 30 - (0.85 - pop.t)*8);
  }

  // milestone celebration — expanding ring + big gold call-out
  if (mileT > 0){
    const k = 1 - mileT/1.5, cy = GAME_H*0.34;
    g.noFill(); g.strokeWeight(1);
    g.stroke(255, 215, 106, 200*(1-k)); g.ellipse(GAME_W/2, cy, 16 + k*70, 16 + k*70);
    g.stroke(255, 138, 208, 150*(1-k)); g.ellipse(GAME_W/2, cy, 8 + k*46, 8 + k*46);
    g.noStroke();
    g.textAlign(CENTER, CENTER); g.textSize(17);
    g.fill(255, 215, 106, 255*Math.min(1, mileT*2.2));
    g.text(mileMsg, GAME_W/2, cy - 3 - k*6);
  }

  // HUD
  g.fill('#e8e8f0'); g.textSize(9); g.textAlign(LEFT, TOP);
  g.text(run + 'm', 6, 6);
  g.fill('#5a5a6a'); g.textSize(7);
  g.text('best ' + best, 6, 17);
  if (combo > 1){
    g.fill('#ffd76a'); g.textSize(8); g.textAlign(LEFT, TOP);
    g.text('×' + combo, 46, 7);
  }
  // notes of the song you've actually played
  g.fill('#9a9aab'); g.textSize(7); g.textAlign(LEFT, TOP);
  g.text('♪ ' + notesHit + '/' + orbs.length, 6, 26);
  g.textAlign(RIGHT, TOP); g.fill('#4b4b58');
  g.text('hold to swing  ·  esc: title', GAME_W-6, 6);

  if (dead){
    g.textAlign(CENTER, CENTER); g.fill('#ff8a8a'); g.textSize(11);
    g.text(deathMsg, GAME_W/2, GAME_H/2 - 6);
    g.fill('#6a6a7a'); g.textSize(7);
    g.text('restarting…', GAME_W/2, GAME_H/2 + 6);
  }

  if (won){
    g.fill(14,14,18,190); g.rect(0,0,GAME_W,GAME_H);
    g.textAlign(CENTER, CENTER);
    const bk = (Math.floor(millis()/450) % 2) === 0;

    g.fill('#ffd76a'); g.textSize(12);
    g.text(gameDone ? 'you played them all!'
                    : (lastPct === 100 ? 'perfect performance!' : 'level complete!'),
           GAME_W/2, 16);
    g.fill('#e8e8f0'); g.textSize(8);
    g.text(LEVELS[level].name + ' · ' + LEVELS[level].by, GAME_W/2, 29);
    g.fill(lastPct === 100 ? '#ffd76a' : '#7fd4ff'); g.textSize(8);
    g.text('♪ ' + notesHit + '/' + orbs.length + ' notes (' + lastPct + '%)  ·  score ' + lastScore,
           GAME_W/2, 41);

    if (entering){
      g.fill('#ffd76a'); g.textSize(9);
      g.text('NEW HIGH SCORE', GAME_W/2, 62);
      // three slots, with a blinking cursor on the next one
      for (let i=0; i<3; i++){
        const bx = GAME_W/2 - 26 + i*26;
        const has = i < initials.length;
        g.fill(has ? '#ffffff' : (i === initials.length && bk ? '#7fd4ff' : '#33333f'));
        g.textSize(16);
        g.text(has ? initials[i] : '_', bx, 84);
      }
      g.fill('#6a6a7a'); g.textSize(7);
      g.text('type your initials  ·  enter to sign', GAME_W/2, 106);
    } else {
      const bd = boardFor(level);
      g.fill('#9a9aab'); g.textSize(7);
      g.text('HIGH SCORES  ·  ' + LEVELS[level].name, GAME_W/2, 58);
      if (!bd.length){
        g.fill('#4b4b58'); g.text('no scores yet', GAME_W/2, 76);
      }
      for (let i=0; i<bd.length; i++){
        const e = bd[i];
        // highlight the run just played
        const mine = e.ini === initials && e.score === lastScore;
        g.fill(mine ? '#ffd76a' : '#8a8a98'); g.textSize(8);
        g.textAlign(LEFT, CENTER);
        g.text((i+1) + '.', GAME_W/2 - 52, 72 + i*11);
        g.text(e.ini,       GAME_W/2 - 38, 72 + i*11);
        g.textAlign(RIGHT, CENTER);
        g.text(e.score,     GAME_W/2 + 38, 72 + i*11);
        g.fill(mine ? '#a88a3a' : '#4b4b58'); g.textSize(6);
        g.text(e.pct + '%', GAME_W/2 + 56, 72 + i*11);
        g.textAlign(CENTER, CENTER);
      }
      // first time through → the scarf
      if (gameDone && scarfNew){
        g.fill('#ffd76a'); g.textSize(8);
        g.text('unlocked · THE SCARF', GAME_W/2, 126);
        g.fill('#8a8a98'); g.textSize(6);
        g.text('it trails behind you from now on', GAME_W/2, 136);
        // a little scarf, waving
        for (let i=0; i<12; i++){
          const t = 1 - i/11;
          const wx = GAME_W/2 - 30 + i*5;
          const wy = 116 + Math.sin(millis()/200 - i*0.5)*2;
          g.strokeWeight(Math.max(1, Math.round(1 + t*2)));
          g.stroke(214 - (1-t)*70, 44 + (1-t)*30, 74 + (1-t)*40, 70 + t*185);
          g.point(wx, wy); g.line(wx, wy, wx+4, wy);
        }
        g.noStroke(); g.strokeWeight(1);
      }
      g.fill('#ffffff'); g.textSize(8);
      if (bk) g.text(gameDone ? 'press to start over'
                              : 'press for level ' + (level+2) + ' · ' + LEVELS[level+1].name,
                     GAME_W/2, gameDone && scarfNew ? 150 : 138);
    }
  }

  if (phase === 'title'){
    g.fill(14,14,18,190); g.rect(0,0,GAME_W,GAME_H);
    g.textAlign(CENTER, CENTER);
    // GRAPPLE, each letter riding its own sine — a wave down the word
    const word = 'GRAPPLE';
    g.textSize(20); g.fill('#ffffff');
    const ws = [...word].map(c => g.textWidth(c));
    let lx = GAME_W/2 - ws.reduce((a,b)=>a+b, 0)/2;
    for (let i=0; i<word.length; i++){
      const bob = Math.sin(millis()/260 - i*0.55) * 4;
      g.text(word[i], lx + ws[i]/2, GAME_H/2 - 28 + bob);
      lx += ws[i];
    }
    g.fill('#e8e8f0'); g.textSize(12);
    g.text(LEVELS[level].name, GAME_W/2, GAME_H/2 + 2);
    g.fill('#7fd4ff'); g.textSize(8);
    g.text('level ' + (level+1) + ' · ' + LEVELS[level].by, GAME_W/2, GAME_H/2 + 16);
    g.fill('#ffffff'); g.textSize(9);
    const blink = (Math.floor(millis()/450) % 2) === 0;
    if (blink) g.text('press space / click', GAME_W/2, GAME_H/2 + 34);
  }
}


/* ══════════════════════════════════════════════════════
   ENGINE   ── helpers + loop, leave this alone ──
   ══════════════════════════════════════════════════════ */

/* ---- input ---- */
const _held = new Set(), _pressed = new Set();
let _clicked = false;

function down(name){
  name = name.toLowerCase();
  if (name==='left')  return _held.has('arrowleft')  || _held.has('a');
  if (name==='right') return _held.has('arrowright') || _held.has('d');
  if (name==='up')    return _held.has('arrowup')    || _held.has('w');
  if (name==='down')  return _held.has('arrowdown')  || _held.has('s');
  if (name==='space') return _held.has(' ');
  if (name==='enter') return _held.has('enter');
  if (name==='esc')   return _held.has('escape');
  return _held.has(name);                 // single letters, etc.
}
function pressed(name){
  name = name.toLowerCase();
  const map = { space:' ', enter:'enter', esc:'escape',
                left:'arrowleft', right:'arrowright', up:'arrowup', down:'arrowdown' };
  return _pressed.has(map[name] || name);
}
function mx(){ return (mouseX - OX) / S; }   // mouse in logical pixels
function my(){ return (mouseY - OY) / S; }
function clicked(){ return _clicked; }        // true only on the frame of a press

/* ---- easing + tween ---- */
const ease = {
  linear:    t => t,
  inQuad:    t => t*t,
  outQuad:   t => 1-(1-t)*(1-t),
  inOutQuad: t => t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2,
  outCubic:  t => 1-Math.pow(1-t,3),
  outBack:   t => { const c1=1.70158, c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); },
  outElastic:t => { const c4=(2*Math.PI)/3; return t===0?0:t===1?1:Math.pow(2,-10*t)*Math.sin((t*10-0.75)*c4)+1; }
};
let _tweens = [];
/* tween(obj, {prop: target,…}, seconds, ease.fn) — returns handle; set .onComplete */
function tween(obj, target, dur, easing){
  easing = easing || ease.linear;
  const from = {}; for (const k in target) from[k] = obj[k];
  const tw = { obj, target, from, dur, easing, t:0, done:false, onComplete:null };
  _tweens.push(tw);
  return tw;
}
function _updateTweens(dt){
  for (const tw of _tweens){
    tw.t += dt;
    const u = tw.dur > 0 ? Math.min(tw.t/tw.dur, 1) : 1;
    const e = tw.easing(u);
    for (const k in tw.target) tw.obj[k] = tw.from[k] + (tw.target[k]-tw.from[k])*e;
    if (u >= 1 && !tw.done){ tw.done = true; if (tw.onComplete) tw.onComplete(); }
  }
  _tweens = _tweens.filter(t => !t.done);
}

/* ---- screenshake ---- */
let _shakeAmt=0, _shakeT=0, _shakeDur=0;
function shake(px, secs){ _shakeAmt=px; _shakeDur=secs; _shakeT=secs; }   // px in logical pixels

/* ---- sound (tiny Web Audio, no libraries) ---- */
let _ac = null;
function _audio(){
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  if (_ac.state === 'suspended') _ac.resume();
  return _ac;
}
function beep(freq=440, dur=0.08, type='square', gain=0.15){
  const ac=_audio(), o=ac.createOscillator(), gn=ac.createGain();
  o.type=type; o.frequency.value=freq; o.connect(gn); gn.connect(ac.destination);
  const t=ac.currentTime;
  gn.gain.setValueAtTime(0.0001, t);
  gn.gain.linearRampToValueAtTime(gain, t+0.005);
  gn.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  o.start(t); o.stop(t+dur+0.02);
}
function sweep(f1, f2, dur=0.15, type='square', gain=0.15){
  const ac=_audio(), o=ac.createOscillator(), gn=ac.createGain();
  o.type=type; o.connect(gn); gn.connect(ac.destination);
  const t=ac.currentTime;
  o.frequency.setValueAtTime(f1, t);
  o.frequency.exponentialRampToValueAtTime(Math.max(1,f2), t+dur);
  gn.gain.setValueAtTime(gain, t);
  gn.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  o.start(t); o.stop(t+dur+0.02);
}

/* ---- loop ---- */
function setup(){
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1); noSmooth();
  g = createGraphics(GAME_W, GAME_H); g.noSmooth();
  _fit();
  // native input (more reliable than p5 key handling)
  window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (!_held.has(k)) _pressed.add(k);
    _held.add(k);
    if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
  });
  window.addEventListener('keyup', e => _held.delete(e.key.toLowerCase()));
  window.addEventListener('pointerdown', () => { _clicked = true; });
  ['pointerdown','keydown','touchstart'].forEach(ev => window.addEventListener(ev, _audio));
  reset();
}
function _fit(){
  S  = Math.max(1, Math.floor(Math.min(width/GAME_W, height/GAME_H)));
  OX = Math.floor((width  - GAME_W*S) / 2);
  OY = Math.floor((height - GAME_H*S) / 2);
}
function windowResized(){ resizeCanvas(windowWidth, windowHeight); _fit(); }

function draw(){
  const dt = Math.min(deltaTime/1000, 1/30);   // clamp so tab-away doesn't teleport
  _updateTweens(dt);
  update(dt);
  render();

  _shakeT = Math.max(0, _shakeT - dt);
  const amp = _shakeDur > 0 ? _shakeAmt*(_shakeT/_shakeDur) : 0;
  const sx = amp ? Math.round(random(-amp, amp)) : 0;
  const sy = amp ? Math.round(random(-amp, amp)) : 0;

  background(BG);
  image(g, OX + sx*S, OY + sy*S, GAME_W*S, GAME_H*S);

  _pressed.clear();
  _clicked = false;
}
</script>
