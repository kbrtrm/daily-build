<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>daily build</title>
<style>
  html,body{margin:0;height:100%;background:#0e0e12;overflow:hidden}
  body{display:flex;align-items:center;justify-content:center}
  canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block}
  #back{position:fixed;top:8px;left:10px;z-index:10;text-decoration:none;color:#8a8a98;
    font:600 13px/1 -apple-system,system-ui,sans-serif;opacity:.5;
    transition:opacity .15s,color .15s;-webkit-user-select:none;user-select:none}
  #back:hover{opacity:1;color:#fff}
</style>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
</head>
<body>
<a id="back" href="../" title="back to the shelf">‹ shelf</a>
<script>
/* ══════════════════════════════════════════════════════
   DAILY BUILD · p5.js template
   ── Seed ──────────────────────────────────────────────
   Riff on:  Juggling — a rhythm catch game + roguelike
   Prompt:   You're a clown juggling at a kid's party. The clown
             throws the arcs; YOU make each catch — tap the hand a
             ball lands in, on the beat (watch the rings). Clean
             catches walk a C-major melody and lift the crowd's
             DELIGHT; misses drop it. Clear an act, read the recap,
             draft a stat/ball (wider window, more flair, +1 ball,
             safety net…), stack a build. Kids lob extra props to
             fold into your routine. Delight hits zero → the kids
             wander off.
   ══════════════════════════════════════════════════════ */

/* ---------- CONFIG ---------- */
const GAME_W = 320;
const GAME_H = 180;
const BG     = '#0e0e12';

let g, S = 1, OX = 0, OY = 0;


/* ══════════════════════════════════════════════════════
   YOUR GAME
   ══════════════════════════════════════════════════════ */

/* ---- tunables ---- */
const HANDY   = 146;
const LX      = 92;
const RX      = 228;
const ARC     = 104;
const BALLR   = 4;
const LEAD    = 1.4;
const BEAT0   = 0.64;
const BEATMIN = 0.42;
const APPROACH= 0.6;
const BASEWIN = 0.13;                 // base catch window (± seconds)
const ACT_BASE= 12;
const ACT_STEP= 7;
const COLS    = ['#ff5c7a', '#5ad1ff', '#ffd24b', '#8affc0', '#c9a0ff', '#ffa24b'];

// music — C major, a walking melody over a I–vi–IV–V bass
const SCALE   = [0, 2, 4, 5, 7, 9, 11];
const ROOT    = 261.63;               // C4
const MELODY  = [0,2,4,2, 4,5,7,5, 7,5,4,2, 4,2,1,0,
                 4,5,7,9, 7,5,4,5, 4,2,4,5, 2,1,0,2];  // scale-degree indices
const BASS    = [0, 5, 3, 4];         // C  A  F  G  (one per 8-step bar)

let balls, props, hands, kids;
let T, beat, delight, combo, score, best = 0;
let act, actGoal, actProg, actCatches, actDrops, recap;
let winBonus, flair, net, netMax, melodyPos, barBeat;
let state, deadT, freeze, nextBeatT, beatPulse, parts, pops, flashT;
let lastSpawnHand, lobLeft, lobInterval, nextLobT;
let draft, sel;

const opp = h => (h === 'L' ? 'R' : 'L');
const handX = h => (h === 'L' ? LX : RX);
const pick = a => a[Math.floor(random(a.length))];

/* ---- upgrade pool (buff your active play) ---- */
const UPGRADES = [
  { id:'skill', name:'STEADY HANDS', desc:'wider catch window', can:()=>winBonus < 0.14, apply:()=>{ winBonus = Math.min(0.14, winBonus + 0.035); } },
  { id:'show',  name:'SHOWMANSHIP',  desc:'more delight/catch', can:()=>flair < 2.4, apply:()=>{ flair += 0.3; } },
  { id:'star',  name:'STAR BALL',    desc:'one ball: 2x, bright', can:()=>balls.some(b=>!b.star),  apply:()=>{ pick(balls.filter(b=>!b.star)).star = true; } },
  { id:'heavy', name:'BEACH BALL',   desc:'one ball: easy, low',  can:()=>balls.some(b=>!b.heavy), apply:()=>{ pick(balls.filter(b=>!b.heavy)).heavy = true; } },
  { id:'extra', name:'+1 BALL',      desc:'another ball & note',  can:()=>balls.length < 6, apply:()=>addBall() },
  { id:'net',   name:'SAFETY NET',   desc:'+1 auto-save/act',     can:()=>netMax < 3, apply:()=>{ netMax++; net = netMax; } },
];
function cardPreview(u){
  if (u.id === 'skill') return 'wider window';
  if (u.id === 'show')  return 'flair ' + flair.toFixed(1) + ' → ' + (flair+0.3).toFixed(1);
  if (u.id === 'extra') return balls.length + ' → ' + (balls.length+1) + ' balls';
  if (u.id === 'net')   return 'saves ' + netMax + ' → ' + (netMax+1);
  if (u.id === 'star')  return 'doubles its delight';
  if (u.id === 'heavy') return 'easy + a low note';
  return '';
}

function makeBall(col, hand, arriveT, deg){
  return { col, deg, kind:'ball', state:'flight', arriveHand:hand, arriveT,
    launchT: arriveT - 3 * BEAT0, fromX: handX(opp(hand)), toX: handX(hand),
    armed:false, err:0, sq:1, star:false, heavy:false, trail:[], flashT:0, redT:0 };
}
function makeKids(){
  return [
    { x:16,  y:150, wind:0, c:'#ffd24b' }, { x:46,  y:158, wind:0, c:'#8affc0' },
    { x:274, y:158, wind:0, c:'#5ad1ff' }, { x:304, y:150, wind:0, c:'#c9a0ff' },
  ];
}

function reset(){
  hands = { L:{ x:LX, side: 1, sq:1, lift:0, phase:0 }, R:{ x:RX, side:-1, sq:1, lift:0, phase:Math.PI } };
  kids  = makeKids();
  balls = []; props = []; parts = []; pops = [];
  const firstHand = ['R', 'L', 'R'];
  for (let i = 0; i < 3; i++) balls.push(makeBall(COLS[i], firstHand[i], LEAD + i * BEAT0, i));
  T = 0; beat = BEAT0; delight = 0.72; combo = 0; score = 0;
  winBonus = 0; flair = 1; netMax = 0; net = 0; melodyPos = 0; barBeat = 0;
  lastSpawnHand = 'L'; lobLeft = true;
  state = 'play'; deadT = 0; freeze = 0; nextBeatT = LEAD; beatPulse = 0; flashT = 0;
  recap = null; draft = null; sel = 0;
  startAct(1);
}

function startAct(n){
  act = n;
  actGoal = ACT_BASE + (n - 1) * ACT_STEP;
  actProg = 0; actCatches = 0; actDrops = 0;
  net = netMax;
  beat = Math.max(BEATMIN, BEAT0 - (n - 1) * 0.03);
  if (n >= 2){ lobInterval = Math.max(3.2, 7 - Math.min(n, 4)) * beat; nextLobT = T + 3 * beat; }
  else       { lobInterval = Infinity; nextLobT = Infinity; }
  state = 'play';
}

function windowSize(b){ return (BASEWIN + winBonus) * (b && b.heavy ? 1.6 : 1); }

/* ---- music ---- */
let _mx = null;
function _music(){
  const ac = _audio();
  if (!_mx){
    const master = ac.createGain(); master.gain.value = 0.8;
    const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 2100; lp.Q.value = 0.3;
    const dly = ac.createDelay(); dly.delayTime.value = 0.30;
    const fb  = ac.createGain(); fb.gain.value = 0.16;
    const wet = ac.createGain(); wet.gain.value = 0.13;
    master.connect(lp); lp.connect(ac.destination);
    lp.connect(dly); dly.connect(fb); fb.connect(dly); dly.connect(wet); wet.connect(ac.destination);
    _mx = { ac, master };
  }
  return _mx;
}
function tone(freq, dur, gain, type){
  const { ac, master } = _music();
  const t = ac.currentTime, d = dur || 0.3;
  const o = ac.createOscillator(); o.type = type || 'sine'; o.frequency.value = freq;
  const gn = ac.createGain();
  gn.gain.setValueAtTime(0.0001, t);
  gn.gain.linearRampToValueAtTime(gain || 0.08, t + 0.012);
  gn.gain.exponentialRampToValueAtTime(0.0001, t + d);
  o.connect(gn); gn.connect(master);
  o.start(t); o.stop(t + d + 0.03);
}
function scaleFreq(idx, octOff){
  const len = SCALE.length;
  const oct = Math.floor(idx / len) + (octOff || 0);
  const s = SCALE[((idx % len) + len) % len] + 12 * oct;
  return ROOT * Math.pow(2, s / 12);
}
function melodyNote(b){
  const idx = MELODY[melodyPos % MELODY.length]; melodyPos++;
  tone(scaleFreq(idx, b.heavy ? -1 : 0), 0.30, 0.085, 'triangle');
  if (b.star) tone(scaleFreq(idx + 2, 0), 0.28, 0.04, 'sine');   // a third above, in key
}

function ballPos(b){
  if (b.state === 'falling'){
    const u = T - b.dropT;
    return { x: b.dropX + b.dropVx * u, y: b.dropY + b.dropVy * u + 260 * u * u };
  }
  const span = b.arriveT - b.launchT;
  let u = (T - b.launchT) / span; u = Math.max(0, Math.min(1, u));
  const fy = b.fromY != null ? b.fromY : HANDY, ty = b.toY != null ? b.toY : HANDY;
  const ah = b.arcH != null ? b.arcH : (b.heavy ? ARC * 1.15 : ARC);
  return { x: b.fromX + (b.toX - b.fromX) * u, y: (fy + (ty - fy) * u) - ah * 4 * u * (1 - u) };
}

function tossOnward(b){
  const from = b.arriveHand;
  b.launchT = b.arriveT; b.arriveHand = opp(from);
  b.fromX = handX(from); b.toX = handX(b.arriveHand);
  b.arriveT = b.launchT + balls.length * beat;
  b.state = 'flight'; b.armed = false;
}

function addBall(){
  let latest = balls[0];
  for (const b of balls) if (b.arriveT > latest.arriveT) latest = b;
  const hand = opp(latest.arriveHand), n = balls.length + 1;
  const b = makeBall(COLS[balls.length % COLS.length], hand, latest.arriveT + beat, balls.length);
  b.launchT = b.arriveT - n * beat;
  b.fromX = handX(opp(hand)); b.toX = handX(hand);
  balls.push(b);
}

function spawnLob(){
  const kid = lobLeft ? kids[0] : kids[3];
  lobLeft = !lobLeft;
  const hand = kid.x < 160 ? 'R' : 'L';
  props.push({ kind:'prop', deg:4, state:'flight', arriveHand:hand, arriveT: T + 3 * beat,
    launchT: T, fromX: kid.x, toX: handX(hand), fromY: kid.y, toY: HANDY, arcH: 92,
    armed:false, err:0, sq:1, trail:[], flashT:0, redT:0 });
  kid.wind = 1; tween(kid, { wind: 0 }, 0.5, ease.outCubic);
  beep(300, 0.05, 'sine', 0.06);
  nextLobT = T + lobInterval;
}

function update(dt){
  updateParts(dt); updatePops(dt);
  beatPulse = Math.max(0, beatPulse - dt * 3.5);
  flashT    = Math.max(0, flashT - dt);

  if (state === 'over'){ T += dt; deadT += dt; if (pressed('space') && deadT > 0.4) reset(); return; }
  if (state === 'draft'){ draftInput(); return; }
  if (freeze > 0){ freeze -= dt; return; }

  T += dt;
  while (T >= nextBeatT){ onBeat(); nextBeatT += beat; }
  if (T >= nextLobT) spawnLob();

  delight = Math.max(0, delight - 0.015 * dt);
  if (delight <= 0){ collapse(); return; }

  if (pressed('left'))  judge('L');
  if (pressed('right')) judge('R');

  for (const b of balls){
    if (b.state === 'flight' && T >= b.arriveT){ if (b.armed) doCatch(b); else b.state = 'held'; }
    if (b.state === 'held' && !b.armed && T > b.arriveT + windowSize(b)) miss(b);
  }
  for (const p of props){
    if (p.state === 'flight' && T >= p.arriveT){ if (p.armed) catchProp(p); else p.state = 'held'; }
    if (p.state === 'held' && !p.armed && T > p.arriveT + windowSize(p)) splatProp(p);
  }
  props = props.filter(p => p.state !== 'gone' && ballPos(p).y < GAME_H + 30);
  balls = balls.filter(b => !b.gone);

  if (state === 'play' && actProg >= actGoal) enterDraft();

  for (const b of balls.concat(props)){
    const p = ballPos(b);
    b.trail.unshift({ x: p.x, y: p.y }); if (b.trail.length > 7) b.trail.pop();
    b.flashT = Math.max(0, b.flashT - dt); b.redT = Math.max(0, b.redT - dt);
  }
}

function onBeat(){
  beatPulse = 1;
  barBeat = (barBeat + 1) % 32;
  tone(scaleFreq(BASS[Math.floor(barBeat / 8) % 4], -2), 0.24, 0.035, 'sine');   // I–vi–IV–V bass
}

/* a tap catches the nearest ball/prop landing in that hand, if it's in the window */
function judge(hand){
  let c = null;
  const consider = b => {
    if (b.state === 'falling' || b.state === 'gone' || b.armed || b.arriveHand !== hand) return;
    if (Math.abs(T - b.arriveT) <= windowSize(b) && (!c || Math.abs(T - b.arriveT) < Math.abs(T - c.arriveT))) c = b;
  };
  balls.forEach(consider); props.forEach(consider);
  if (!c){ beep(150, 0.03, 'sine', 0.05); return; }         // mistimed / empty tap
  c.armed = true; c.err = Math.abs(T - c.arriveT);
  if (c.state === 'held'){ c.kind === 'prop' ? catchProp(c) : doCatch(c); }
}

function doCatch(b){
  const perfect = b.err <= 0.35 * windowSize(b);
  combo++; score += 1 + combo; best = Math.max(best, score);
  actCatches++; actProg++;
  let gain = (perfect ? 0.05 : 0.032) * flair * (b.star ? 2 : 1) * (b.heavy ? 1.15 : 1);
  delight = Math.min(1, delight + gain);

  const from = b.arriveHand;
  hands[from].sq = 0.45; tween(hands[from], { sq: 1 },   0.30, ease.outBack);
  hands[from].lift = 1;  tween(hands[from], { lift: 0 }, 0.26, ease.outCubic);
  b.sq = 0.5; tween(b, { sq: 1 }, 0.28, ease.outBack);
  b.flashT = 0.14;
  burst(handX(from), HANDY - 3, perfect ? 10 : 5, b.star ? [255,215,90] : hexRGB(b.col));
  melodyNote(b);
  if (perfect){ freeze = 0.045; flashT = 0.08; }
  if (b.star) popText(handX(from), HANDY - 13, '★', [255,215,90], 10);
  if (combo > 0 && combo % 10 === 0){ popText(GAME_W/2, 46, 'x' + combo + '!', [255,255,255], 12); for (const k of kids){ k.wind = 1; tween(k, { wind: 0 }, 0.4, ease.outCubic); } }

  if (b.temp != null && --b.temp <= 0) returnToCrowd(b);
  else tossOnward(b);
}

function miss(b){
  if (net > 0){ net--; combo = 0; popText(handX(b.arriveHand), HANDY - 13, 'saved', [159,208,255], 9);
                burst(handX(b.arriveHand), HANDY - 3, 6, [159,208,255]); beep(320, 0.05, 'sine', 0.08);
                if (b.temp != null){ b.gone = true; } else tossOnward(b); return; }
  combo = 0; delight -= 0.09; actDrops++; b.redT = 0.4;
  shake(0.9, 0.1);
  tone(scaleFreq(0, -1), 0.20, 0.045, 'sine');               // soft low note, in key
  burst(handX(b.arriveHand), HANDY - 3, 5, [200, 110, 90]);
  popText(handX(b.arriveHand), HANDY - 13, 'miss', [255, 96, 104], 9);
  if (delight <= 0){ collapse(); return; }
  if (b.temp != null){ b.gone = true; return; }
  tossOnward(b);
}

function catchProp(p){
  combo++; score += 3; best = Math.max(best, score);
  delight = Math.min(1, delight + 0.04 * flair);
  const from = p.arriveHand;
  hands[from].sq = 0.45; tween(hands[from], { sq: 1 }, 0.30, ease.outBack);
  hands[from].lift = 1;  tween(hands[from], { lift: 0 }, 0.26, ease.outCubic);
  burst(handX(from), HANDY - 3, 12, [255, 220, 120]);
  tone(scaleFreq(4, 1), 0.28, 0.08, 'triangle'); shake(0.6, 0.06);
  popText(handX(from), HANDY - 13, 'caught!', [255, 220, 120], 9);
  const nb = makeBall('#ffd24b', from, p.arriveT, balls.length);
  nb.temp = 5; balls.push(nb); tossOnward(nb);
  p.state = 'gone';
}

function splatProp(p){
  combo = 0; delight = Math.max(0, delight - 0.08);
  shake(1, 0.1); tone(scaleFreq(0, -1), 0.20, 0.045, 'sine');
  burst(handX(p.arriveHand), HANDY, 8, [200, 120, 90]);
  popText(handX(p.arriveHand), HANDY - 13, 'splat', [255, 120, 96], 9);
  p.state = 'gone';
  if (delight <= 0) collapse();
}

function returnToCrowd(b){
  b.gone = true;
  score += 8; best = Math.max(best, score);
  delight = Math.min(1, delight + 0.05 * flair);
  burst(handX(b.arriveHand), HANDY - 3, 14, [255, 220, 120]);
  popText(handX(b.arriveHand), HANDY - 16, 'nice!', [255, 220, 120], 9);
  tone(scaleFreq(4, 1), 0.3, 0.08, 'triangle');
}

function collapse(){
  delight = 0; state = 'over'; deadT = 0;
  shake(4, 0.4); sweep(500, 40, 0.6, 'sawtooth', 0.16); beep(90, 0.2, 'square', 0.13);
  for (const b of balls.concat(props)){
    const p = ballPos(b);
    b.state = 'falling'; b.dropT = T; b.dropX = p.x; b.dropY = p.y;
    b.dropVx = random(-30, 30); b.dropVy = random(-60, -10);
  }
}

/* ---- draft with a recap that tells you WHY ---- */
function offer3(){
  const avail = UPGRADES.filter(u => u.can()), out = [];
  while (out.length < 3 && avail.length) out.push(avail.splice(Math.floor(random(avail.length)), 1)[0]);
  return out;
}
function enterDraft(){
  const total = actCatches + actDrops, clean = total ? actCatches / total : 1;
  let diag;
  if (clean < 0.72)                      diag = 'Missing catches — STEADY HANDS or a BEACH BALL.';
  else if (delight < 0.4)                diag = 'The crowd cooled — SHOWMANSHIP helps.';
  else if (clean > 0.9 && delight > 0.7) diag = 'Smooth show! Push it — +1 BALL or STAR BALL.';
  else                                   diag = 'Solid — shore up a weakness or add flair.';
  recap = { catches: actCatches, drops: actDrops, clean: Math.round(clean * 100), diag };
  state = 'draft'; draft = offer3(); sel = 0;
  beep(500, 0.08, 'triangle', 0.1); sweep(500, 760, 0.12, 'sine', 0.06);
}
function cardGeom(i){ return { x: 16 + i * 98, y: 46, w: 92, h: 92 }; }
function cardAt(x, y){
  for (let i = 0; i < (draft ? draft.length : 0); i++){
    const c = cardGeom(i);
    if (x >= c.x && x <= c.x + c.w && y >= c.y && y <= c.y + c.h) return i;
  }
  return -1;
}
function draftInput(){
  if (!draft || !draft.length){ startAct(act + 1); return; }
  if (pressed('left')){  sel = (sel + draft.length - 1) % draft.length; beep(300, 0.02, 'sine', 0.06); }
  if (pressed('right')){ sel = (sel + 1) % draft.length; beep(300, 0.02, 'sine', 0.06); }
  const clickIdx = clicked() ? cardAt(mx(), my()) : -1;
  if (clickIdx >= 0) sel = clickIdx;
  if (pressed('space') || pressed('enter') || clickIdx >= 0){
    draft[sel].apply();
    beep(760, 0.1, 'triangle', 0.12); sweep(500, 1000, 0.15, 'sine', 0.07);
    draft = null; startAct(act + 1);
  }
}

/* ---- particles + floating text ---- */
function hexRGB(h){ return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }
function burst(x, y, n, col){
  for (let i = 0; i < n; i++){
    const a = random(Math.PI * 2), sp = random(20, 95);
    parts.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 20, life: random(0.25, 0.55), max: 0.55, col });
  }
}
function updateParts(dt){ for (const p of parts){ p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 160*dt; p.vx *= 0.94; p.life -= dt; } parts = parts.filter(p => p.life > 0); }
function popText(x, y, txt, col, size){ pops.push({ x, y, txt, col: col || [255,255,255], size: size || 8, life: 0.75, vy: -16 }); }
function updatePops(dt){ for (const p of pops){ p.y += p.vy*dt; p.vy *= 0.9; p.life -= dt; } pops = pops.filter(p => p.life > 0); }

/* ══════════════════════════════════════════════════════
   RENDER
   ══════════════════════════════════════════════════════ */
function render(){
  g.background(BG);
  g.noStroke();

  g.fill(255, 240, 200, 9); g.ellipse(GAME_W/2, 74, 250, 210);
  g.fill(18, 18, 26);       g.rect(0, HANDY + 10, GAME_W, GAME_H - HANDY - 10);

  if (delight < 0.3){ const a = (0.3 - delight) / 0.3 * 55; g.fill(255, 60, 70, a); g.rect(0, 0, GAME_W, GAME_H); }
  if (flashT > 0){ g.fill(255, 255, 255, flashT * 90); g.rect(0, 0, GAME_W, GAME_H); }

  for (const k of kids) drawKid(k);
  drawClown();

  const bp = beatPulse * beatPulse;
  g.fill(120, 120, 150, 34 * bp);
  g.ellipse(GAME_W/2, HANDY + 12, 50 + 70*(1-bp), 12 + 8*(1-bp));

  drawGlove(hands.L); drawGlove(hands.R);

  // timing rings: white shrink-to-catch; a ball waiting (held) pulses red — tap now
  if (state === 'play' || state === 'draft'){
    for (const b of balls.concat(props)){
      if (b.state === 'flight' && !b.armed){
        const rem = b.arriveT - T; if (rem < 0 || rem > APPROACH) continue;
        const p = ballPos(b), rr = BALLR + 24 * (rem / APPROACH), close = 1 - rem / APPROACH;
        g.noFill(); g.strokeWeight(1);
        if (b.kind === 'prop') g.stroke(255, 200, 120, 30 + 170*close);
        else                   g.stroke(255, 255, 255, 30 + 170*close);
        g.ellipse(p.x, p.y, rr*2, rr*2); g.noStroke();
      } else if (b.state === 'held' && !b.armed){
        g.noFill(); g.stroke(255, 80, 96, 210); g.strokeWeight(1);
        g.ellipse(handX(b.arriveHand), HANDY - 3, 13, 13); g.noStroke();
      }
    }
  }

  for (const b of balls.concat(props)) drawBall(b);

  for (const p of parts){ const a = Math.max(0, p.life / p.max) * 255; g.fill(p.col[0], p.col[1], p.col[2], a); g.rect(p.x-1, p.y-1, 2, 2); }
  for (const p of pops){ const a = Math.min(1, p.life / 0.3) * 255; g.fill(p.col[0], p.col[1], p.col[2], a); g.textAlign(CENTER, CENTER); g.textSize(p.size); g.text(p.txt, p.x, p.y); }

  drawHUD();
  if (state === 'draft') drawDraft();
  if (state === 'over')  drawOver();
}

function drawBall(b){
  const rgb = b.kind === 'prop' ? [255, 210, 130] : hexRGB(b.col);
  for (let i = b.trail.length - 1; i >= 0; i--){ const t = 1 - i / b.trail.length; g.fill(rgb[0], rgb[1], rgb[2], 70 * t); g.ellipse(b.trail[i].x, b.trail[i].y, BALLR * 1.5 * t, BALLR * 1.5 * t); }
  const p = ballPos(b), r = b.heavy ? BALLR * 1.7 : BALLR;
  if (b.redT > 0)        g.fill(255, 80, 90);
  else if (b.flashT > 0) g.fill(255, 255, 255);
  else if (b.kind === 'prop') g.fill(255, 210, 130);
  else                   g.fill(b.col);
  g.ellipse(p.x, p.y, r * 2 * (2 - b.sq), r * 2 * b.sq);
  if (b.star){ g.fill(255, 255, 255, 220); g.ellipse(p.x, p.y, 2.4, 2.4); }
  else { g.fill(255, 255, 255, 120); g.ellipse(p.x - 1, p.y - 1, r * 0.8, r * 0.8); }
}

function drawHUD(){
  const bw = GAME_W - 16;
  g.fill('#22222c'); g.rect(8, 5, bw, 3, 1);
  g.fill(delight > 0.4 ? '#ffcf5a' : '#ff5c5c'); g.rect(8, 5, bw * Math.max(0, delight), 3, 1);
  g.textSize(8);
  g.fill('#8a8a98'); g.textAlign(LEFT, TOP); g.text('delight', 8, 10);
  const total = actCatches + actDrops, clean = total ? Math.round(actCatches / total * 100) : 100;
  g.fill('#c9c9d6'); g.textAlign(CENTER, TOP); g.text('act ' + act + '   ' + Math.min(actProg, actGoal) + '/' + actGoal + '   ' + clean + '% clean', GAME_W/2, 10);
  g.fill('#8a8a98'); g.textAlign(RIGHT, TOP); g.text('best ' + best, GAME_W - 8, 10);
  if (netMax > 0){ for (let i = 0; i < netMax; i++){ g.fill(i < net ? '#9fd0ff' : '#2a3a48'); g.ellipse(11 + i*7, 24, 4, 4); } }
  if (combo > 2){ g.fill('#fff'); g.textAlign(CENTER, TOP); g.textSize(8 + Math.min(combo, 20) * 0.5); g.text('x' + combo, GAME_W/2, 22); }
  if (act === 1 && actProg < 4 && state === 'play'){ g.fill('#5a5a6a'); g.textSize(8); g.textAlign(CENTER, CENTER); g.text('tap  ←/→  (a/d)  as each ball lands', GAME_W/2, 118); }
}

function drawGlove(h){
  const t = T * 2.6 + h.phase, bob = Math.sin(t) * 1.3, rot = Math.sin(t) * 0.14 + h.side * 0.10;
  g.push(); g.translate(h.x, HANDY + 6 - h.lift * 6 + bob); g.rotate(rot);
  const sq = h.sq;
  g.stroke('#b9b9c6'); g.strokeWeight(1);
  g.fill('#eef0f5'); g.rect(-5, 5, 10, 4, 2);
  g.fill('#ffffff'); g.ellipse(0, 0, 12 * (2 - sq) / 1.35, 11 * sq);
  for (let i = 0; i < 4; i++){ const a = (i - 1.5) * 0.34; g.push(); g.rotate(a); g.ellipse(0, -8, 3.2, 7.5); g.pop(); }
  g.push(); g.translate(h.side * 5, 0); g.rotate(h.side * 0.5); g.ellipse(0, -2, 3.2, 6); g.pop();
  g.noStroke(); g.stroke('#d2d2dc'); g.strokeWeight(1);
  g.line(-2.5, -1, -2.5, 4); g.line(0, -2, 0, 4); g.line(2.5, -1, 2.5, 4);
  g.noStroke(); g.pop();
}

function drawKid(k){
  const bob = k.wind * 3;
  g.fill(k.c); g.ellipse(k.x, k.y - bob, 9, 9);
  g.fill('#1a1a20'); g.ellipse(k.x - 2, k.y - 1 - bob, 1.4, 1.4); g.ellipse(k.x + 2, k.y - 1 - bob, 1.4, 1.4);
  g.noFill(); g.stroke('#1a1a20'); g.strokeWeight(1);
  if (delight > 0.6)       g.arc(k.x, k.y + 1 - bob, 5, 5, 0, Math.PI);
  else if (delight > 0.35) g.line(k.x - 2, k.y + 2 - bob, k.x + 2, k.y + 2 - bob);
  else                     g.arc(k.x, k.y + 3 - bob, 5, 5, Math.PI, 2 * Math.PI);
  g.noStroke();
}

function drawClown(){
  const x = GAME_W/2, y = GAME_H - 7;
  g.fill('#ffd24b'); g.triangle(x - 4, y - 11, x + 4, y - 11, x, y - 18);
  g.fill('#5ad1ff'); g.ellipse(x - 4, y - 9, 3, 3); g.ellipse(x + 4, y - 9, 3, 3);
  g.fill('#e8e8ee'); g.ellipse(x, y - 6, 12, 12);
  g.fill('#1a1a20'); g.ellipse(x - 2.5, y - 8, 1.4, 1.4); g.ellipse(x + 2.5, y - 8, 1.4, 1.4);
  g.fill('#ff4b5c'); g.ellipse(x, y - 4, 3.6, 3.6);
  g.fill('#ff5c7a'); g.rect(x - 6, y - 1, 12, 4, 2);
}

function drawUpgradeIcon(id, x, y){
  g.noStroke();
  if (id === 'skill'){ g.noFill(); g.stroke('#8affc0'); g.strokeWeight(1); g.ellipse(x,y,13,13); g.ellipse(x,y,6,6); g.noStroke(); g.fill('#8affc0'); g.ellipse(x,y,2,2); }
  else if (id === 'show'){ g.fill('#ffd24b'); for (let i=0;i<3;i++){ const a=i*2.1; g.ellipse(x+Math.cos(a)*5, y+Math.sin(a)*5, 3,3); } g.fill('#fff'); g.ellipse(x,y,3,3); }
  else if (id === 'star'){ g.fill('#ffd24b'); g.ellipse(x,y,9,9); g.fill('#fff'); g.ellipse(x,y,3,3); }
  else if (id === 'heavy'){ g.fill('#8affc0'); g.ellipse(x,y,13,13); g.fill(255,255,255,120); g.ellipse(x-2,y-2,4,4); }
  else if (id === 'extra'){ g.fill('#ff5c7a'); g.ellipse(x-4,y,5,5); g.fill('#5ad1ff'); g.ellipse(x+4,y-2,5,5); g.fill('#ffd24b'); g.ellipse(x,y+3,5,5); }
  else if (id === 'net'){ g.stroke('#9fd0ff'); g.strokeWeight(1); g.noFill(); for (let i=-1;i<=1;i++){ g.line(x-6, y+i*3, x+6, y+i*3); g.line(x+i*4, y-4, x+i*4, y+4); } g.noStroke(); }
}

function drawDraft(){
  g.fill(10, 10, 14, 188); g.rect(0, 0, GAME_W, GAME_H);
  g.textAlign(CENTER, TOP);
  g.fill('#ffd24b'); g.textSize(10); g.text('the crowd wants MORE', GAME_W/2, 5);
  if (recap){
    g.textSize(8);
    g.fill('#c9c9d6'); g.text(recap.catches + ' caught  ·  ' + recap.drops + ' dropped  ·  ' + recap.clean + '% clean', GAME_W/2, 19);
    g.fill(recap.clean < 72 ? '#ff9a9a' : '#8affc0'); g.text(recap.diag, GAME_W/2, 30);
  }
  for (let i = 0; i < draft.length; i++){
    const c = cardGeom(i), u = draft[i], on = i === sel;
    g.fill(on ? '#2a2a38' : '#161620'); g.rect(c.x, c.y, c.w, c.h, 4);
    g.noFill(); g.strokeWeight(1); g.stroke(on ? '#ffd24b' : '#3a3a48'); g.rect(c.x, c.y, c.w, c.h, 4); g.noStroke();
    drawUpgradeIcon(u.id, c.x + c.w/2, c.y + 22);
    g.fill('#e9e9ef'); g.textAlign(CENTER, CENTER); g.textSize(8); g.text(u.name, c.x + c.w/2, c.y + 46);
    g.fill('#9a9aa8'); g.text(u.desc, c.x + c.w/2, c.y + 60);
    g.fill(on ? '#ffd24b' : '#6f6f7e'); g.text(cardPreview(u), c.x + c.w/2, c.y + 76);
  }
  g.fill('#6f6f7e'); g.textAlign(CENTER, BOTTOM); g.textSize(8);
  g.text('you: window ' + Math.round((BASEWIN+winBonus)*1000) + 'ms  ·  flair ' + flair.toFixed(1) + '  ·  ' + balls.length + ' balls     ←/→ · space', GAME_W/2, GAME_H - 4);
}

function drawOver(){
  g.fill(10, 10, 14, 205); g.rect(0, 0, GAME_W, GAME_H);
  g.fill('#e9e9ef'); g.textAlign(CENTER, CENTER); g.textSize(11); g.text('the kids wandered off…', GAME_W/2, GAME_H/2 - 16);
  g.fill('#b0b0bc'); g.textSize(8); g.text('you reached act ' + act + '   ·   score ' + score, GAME_W/2, GAME_H/2 + 1);
  g.fill('#7c7c8a'); g.text('best ' + best + '    —    space for a new party', GAME_W/2, GAME_H/2 + 14);
}


/* ══════════════════════════════════════════════════════
   ENGINE   ── helpers + loop, leave this alone ──
   ══════════════════════════════════════════════════════ */

/* ---- input ---- */
const _held = new Set(), _pressed = new Set();
let _clicked = false;

function down(name){
  name = name.toLowerCase();
  if (name==='left')  return _held.has('arrowleft')  || _held.has('a');
  if (name==='right') return _held.has('arrowright') || _held.has('d');
  if (name==='up')    return _held.has('arrowup')    || _held.has('w');
  if (name==='down')  return _held.has('arrowdown')  || _held.has('s');
  if (name==='space') return _held.has(' ');
  if (name==='enter') return _held.has('enter');
  if (name==='esc')   return _held.has('escape');
  return _held.has(name);                 // single letters, etc.
}
function pressed(name){
  name = name.toLowerCase();
  const map = { space:' ', enter:'enter', esc:'escape',
                left:'arrowleft', right:'arrowright', up:'arrowup', down:'arrowdown' };
  return _pressed.has(map[name] || name);
}
function mx(){ return (mouseX - OX) / S; }   // mouse in logical pixels
function my(){ return (mouseY - OY) / S; }
function clicked(){ return _clicked; }        // true only on the frame of a press

/* ---- easing + tween ---- */
const ease = {
  linear:    t => t,
  inQuad:    t => t*t,
  outQuad:   t => 1-(1-t)*(1-t),
  inOutQuad: t => t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2,
  outCubic:  t => 1-Math.pow(1-t,3),
  outBack:   t => { const c1=1.70158, c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); },
  outElastic:t => { const c4=(2*Math.PI)/3; return t===0?0:t===1?1:Math.pow(2,-10*t)*Math.sin((t*10-0.75)*c4)+1; }
};
let _tweens = [];
/* tween(obj, {prop: target,…}, seconds, ease.fn) — returns handle; set .onComplete */
function tween(obj, target, dur, easing){
  easing = easing || ease.linear;
  const from = {}; for (const k in target) from[k] = obj[k];
  const tw = { obj, target, from, dur, easing, t:0, done:false, onComplete:null };
  _tweens.push(tw);
  return tw;
}
function _updateTweens(dt){
  for (const tw of _tweens){
    tw.t += dt;
    const u = tw.dur > 0 ? Math.min(tw.t/tw.dur, 1) : 1;
    const e = tw.easing(u);
    for (const k in tw.target) tw.obj[k] = tw.from[k] + (tw.target[k]-tw.from[k])*e;
    if (u >= 1 && !tw.done){ tw.done = true; if (tw.onComplete) tw.onComplete(); }
  }
  _tweens = _tweens.filter(t => !t.done);
}

/* ---- screenshake ---- */
let _shakeAmt=0, _shakeT=0, _shakeDur=0;
function shake(px, secs){ _shakeAmt=px; _shakeDur=secs; _shakeT=secs; }   // px in logical pixels

/* ---- sound (tiny Web Audio, no libraries) ---- */
let _ac = null;
function _audio(){
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  if (_ac.state === 'suspended') _ac.resume();
  return _ac;
}
function beep(freq=440, dur=0.08, type='square', gain=0.15){
  const ac=_audio(), o=ac.createOscillator(), gn=ac.createGain();
  o.type=type; o.frequency.value=freq; o.connect(gn); gn.connect(ac.destination);
  const t=ac.currentTime;
  gn.gain.setValueAtTime(0.0001, t);
  gn.gain.linearRampToValueAtTime(gain, t+0.005);
  gn.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  o.start(t); o.stop(t+dur+0.02);
}
function sweep(f1, f2, dur=0.15, type='square', gain=0.15){
  const ac=_audio(), o=ac.createOscillator(), gn=ac.createGain();
  o.type=type; o.connect(gn); gn.connect(ac.destination);
  const t=ac.currentTime;
  o.frequency.setValueAtTime(f1, t);
  o.frequency.exponentialRampToValueAtTime(Math.max(1,f2), t+dur);
  gn.gain.setValueAtTime(gain, t);
  gn.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  o.start(t); o.stop(t+dur+0.02);
}

/* ---- loop ---- */
function setup(){
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1); noSmooth();
  g = createGraphics(GAME_W, GAME_H); g.noSmooth();
  _fit();
  // native input (more reliable than p5 key handling)
  window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (!_held.has(k)) _pressed.add(k);
    _held.add(k);
    if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
  });
  window.addEventListener('keyup', e => _held.delete(e.key.toLowerCase()));
  window.addEventListener('pointerdown', () => { _clicked = true; });
  ['pointerdown','keydown','touchstart'].forEach(ev => window.addEventListener(ev, _audio));
  reset();
}
function _fit(){
  S  = Math.max(1, Math.floor(Math.min(width/GAME_W, height/GAME_H)));
  OX = Math.floor((width  - GAME_W*S) / 2);
  OY = Math.floor((height - GAME_H*S) / 2);
}
function windowResized(){ resizeCanvas(windowWidth, windowHeight); _fit(); }

function draw(){
  const dt = Math.min(deltaTime/1000, 1/30);   // clamp so tab-away doesn't teleport
  _updateTweens(dt);
  update(dt);
  render();

  _shakeT = Math.max(0, _shakeT - dt);
  const amp = _shakeDur > 0 ? _shakeAmt*(_shakeT/_shakeDur) : 0;
  const sx = amp ? Math.round(random(-amp, amp)) : 0;
  const sy = amp ? Math.round(random(-amp, amp)) : 0;

  background(BG);
  image(g, OX + sx*S, OY + sy*S, GAME_W*S, GAME_H*S);

  _pressed.clear();
  _clicked = false;
}
</script>
