name: build index
on:
  push:
    branches: [ main ]
permissions:
  contents: write
jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate days.json from date folders
        run: |
          find . -maxdepth 1 -type d -regextype posix-extended \
            -regex '\./[0-9]{4}-[0-9]{2}-[0-9]{2}.*' -printf '%f\n' \
            | sort -r | jq -R . | jq -s . > days.json
      - name: Commit if changed
        run: |
          if ! git diff --quiet days.json; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add days.json
            git commit -m "chore: update days.json"
            git push
          fi
